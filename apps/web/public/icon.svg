<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="49" fill="#1A0A00"/>
  <!-- Outer rim -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#F5C242" stroke-width="5.5"/>
  <!-- 8 spokes (clockwise from 12 o'clock) -->
  <line x1="50" y1="39" x2="50" y2="10"       stroke="#F5C242" stroke-width="4" stroke-linecap="round"/>
  <line x1="57.78" y1="42.22" x2="78.28" y2="21.72" stroke="#F5C242" stroke-width="4" stroke-linecap="round"/>
  <line x1="61" y1="50" x2="90" y2="50"       stroke="#F5C242" stroke-width="4" stroke-linecap="round"/>
  <line x1="57.78" y1="57.78" x2="78.28" y2="78.28" stroke="#F5C242" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="61" x2="50" y2="90"       stroke="#F5C242" stroke-width="4" stroke-linecap="round"/>
  <line x1="42.22" y1="57.78" x2="21.72" y2="78.28" stroke="#F5C242" stroke-width="4" stroke-linecap="round"/>
  <line x1="39" y1="50" x2="10" y2="50"       stroke="#F5C242" stroke-width="4" stroke-linecap="round"/>
  <line x1="42.22" y1="42.22" x2="21.72" y2="21.72" stroke="#F5C242" stroke-width="4" stroke-linecap="round"/>
  <!-- Hub -->
  <circle cx="50" cy="50" r="8" fill="#F5C242"/>
</svg>
