name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same branch/PR when a new commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint, build & file-length
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (with corpus submodule)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check file lengths (<= 400 lines)
        run: ./file_length.sh

      - name: Lint (ESLint + Prettier + TS rules)
        run: npm run lint

      - name: Build (Next.js + corpus generation)
        run: npm run build
