name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same branch/PR when a new commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint, build & file-length
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (with corpus submodule)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check file lengths (<= 400 lines)
        run: pnpm run file-length

      - name: Lint (ESLint + TS rules)
        run: pnpm run lint

      - name: Check formatting
        run: pnpm run format:check

      - name: Build legacy app
        run: pnpm run build
