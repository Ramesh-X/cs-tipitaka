name: Deploy to Cloudflare

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for this deploy (for the audit log)'
        required: false
        default: 'Manual production deploy'

# Prevent concurrent deploys; never cancel a deploy that's in progress.
concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy (Cloudflare Workers)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Checkout (with corpus submodule)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & deploy to Cloudflare
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
